<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TetoAI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>

        <div class="avatar">
            🤖
        </div>

        <div>

            <h1>TetoAI</h1>
            <p id="status">Online</p>

        </div>

    </header>

    <div id="chat"></div>

    <div class="inputBar">

        <button onclick="voice()">🎤</button>

        <input
            id="message"
            placeholder="Talk with Teto..."
        >

        <button onclick="send()">➤</button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
</html>
